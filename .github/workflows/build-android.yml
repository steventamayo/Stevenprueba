name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar dependencias
        run: npm install

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Generar ícono de la app
        run: |
          if [ -f resources/icon.png ]; then
            npx @capacitor/assets generate --android --iconBackgroundColor "#0d1016" --iconBackgroundColorDark "#0d1016" --splashBackgroundColor "#0d1016" --splashBackgroundColorDark "#0d1016"
          else
            echo "No se subió un ícono personalizado — se usa el ícono genérico de Capacitor."
          fi

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Permisos de gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
